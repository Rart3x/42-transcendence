version: '3'

services:
  web:
    build: ./web/
    container_name: web
    volumes:
      - web_vol:/app/front/dist
    networks:
      - ntk

  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - 443:443
    volumes: 
      - ./nginx/tools/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - ntk

volumes:
  web_vol:
    name: web_vol
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./vol

networks:
  ntk:
    driver: bridge
